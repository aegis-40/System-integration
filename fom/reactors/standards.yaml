    primary_circulation: { value: 1,     source: "passive ideal" }
    n_active_components: { value: 1,      source: "passive ideal" }
    pct:                 { value: 600,   source: "good steady PCT; limit 1204 (10 CFR 50.46)" }
    mdnbr:               { value: 2.0,   source: "good DNB margin; limit 1.3 (SRP 4.4)" }
    peaking_factor_3d:   { value: 1.5,   source: "good 3D F_q; limit 2.5 (NUREG-1431 LCO)" }
    mtc:                 { value: -40,   source: "strongly negative MTC target" }
  economic:
    specific_revenue:    { value: 500,   source: "benchmark $/kWe-yr (electricity-only baseline)" }
