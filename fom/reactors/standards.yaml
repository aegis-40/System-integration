    design_life:         { value: 60,    source: "60-year design life target" }
  efficiency:
    thermal_efficiency:  { value: 0.33,  source: "good PWR-class η" }
    burnup:              { value: 50,    source: "high-burnup target" }
    capacity_factor:     { value: 0.95,  source: "high CF target" }
    linear_heat_rate:    { value: 15,    source: "moderate LHR target" }
