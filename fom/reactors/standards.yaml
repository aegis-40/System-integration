id: standards
display_name: "Standards/target reference"
country: "—"
developer: "IAEA/NRC limits + best-practice targets"
status: benchmark
source: "absolute reference: regulatory limits + good-design targets (NOT a real reactor)"

# Synthetic reference of ABSOLUTE target values. Score wFOM(reactor, standards):
#   > 0 ⇒ reactor beats the benchmark on the weighted aggregate.
# No 'descriptive' block ⇒ engine uses these explicit values directly (no derivation).

categories:
