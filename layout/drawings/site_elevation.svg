<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" font-family="Arial, Helvetica, sans-serif">
  <rect width="1120" height="600" fill="white"/>

  <!-- Title -->
  <text x="30" y="34" font-size="22" font-weight="bold" fill="#1b2a36">Aegis-40 — Site Elevation / Section</text>
  <text x="30" y="52" font-size="13" fill="#55606a">FER §8.10 R3→R4. Vertical TRUE scale (1:125, 8 px/m). Horizontal schematic — not plan distance.</text>
  <text x="30" y="68" font-size="11" fill="#9a6700">Section along the compact spine (W→E: SFB→RXB→TB→TCES→SOE) · rev_4 37-FA RPV ~10 m × Ø3.25 m + internal IRWST pool (CAREM) · C1 resolved 2026-06-26</text>

  <!-- Sky -->
  <rect x="70" y="120" width="1010" height="260" fill="#fcfdff"/>
  <!-- Soil below grade (hatched) -->
  <rect x="70" y="380" width="1010" height="150" fill="#efe6d8"/>
  <defs>
    <pattern id="soil" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#c9b48f" stroke-width="1"/>
    </pattern>
  </defs>
  <rect x="70" y="380" width="1010" height="150" fill="url(#soil)" opacity="0.6"/>

  <!-- ===== Vertical scale (left), 8 px/m, grade at y=380 ===== -->
  <g font-size="10" fill="#55606a">
    <line x1="64" y1="140" x2="64" y2="500" stroke="#9aa6b0" stroke-width="1"/>
    <!-- +30 -->
    <line x1="60" y1="140" x2="68" y2="140" stroke="#9aa6b0"/><text x="34" y="144">+30</text>
    <line x1="60" y1="220" x2="68" y2="220" stroke="#9aa6b0"/><text x="34" y="224">+20</text>
    <line x1="60" y1="300" x2="68" y2="300" stroke="#9aa6b0"/><text x="34" y="304">+10</text>
    <line x1="60" y1="380" x2="68" y2="380" stroke="#1b2a36" stroke-width="1.5"/><text x="30" y="384" font-weight="bold" fill="#1b2a36">0 m</text>
    <line x1="60" y1="460" x2="68" y2="460" stroke="#9aa6b0"/><text x="32" y="464">−10</text>
  </g>

  <!-- ===== Grade line ===== -->
  <line x1="70" y1="380" x2="1080" y2="380" stroke="#1b2a36" stroke-width="2.5"/>
  <text x="1010" y="374" font-size="11" font-weight="bold" fill="#1b2a36">GRADE</text>

  <!-- ===== Buildings — SECTION ALONG THE SPINE (W→E): SFB · RXB · TB · TCES · SOE ===== -->
  <!-- SFB (Storage), nuclear blue, 15 m -->
  <rect x="150" y="260" width="100" height="120" fill="#cfe8ff" stroke="#1b4965" stroke-width="1.5"/>
  <!-- off-gas stack (on WMB, north flank — shown behind the section) -->
  <rect x="300" y="150" width="10" height="230" fill="#e3ecf3" stroke="#1b4965" stroke-width="1" stroke-dasharray="2 1.5"/>
  <text x="305" y="146" font-size="8" fill="#8090a0" text-anchor="middle">stack (WMB, flank)</text>

  <!-- RXB (NI, tall + below grade) -->
  <rect x="338" y="140" width="96" height="240" fill="#aad4f5" stroke="#0d3550" stroke-width="2"/>   <!-- 30 m above -->
  <rect x="354" y="380" width="64" height="120" fill="#cfe8ff" stroke="#0d3550" stroke-width="2"/>   <!-- below: reactor cavity -->
  <path d="M338,160 Q386,128 434,160" fill="#aad4f5" stroke="#0d3550" stroke-width="2"/>
  <!-- internal IRWST pool (CAREM-style) around the RPV -->
  <rect x="358" y="388" width="56" height="108" fill="#bfe6ec" stroke="#16808c" stroke-width="0.8" stroke-dasharray="2 1.5"/>
  <text x="416" y="470" font-size="8" fill="#16808c">internal IRWST pool (CAREM)</text>
  <!-- RPV (rev_4 37-FA): ~10 m × Ø3.25 m, partially below grade -->
  <rect x="373" y="384" width="26" height="100" fill="#7fb5e0" stroke="#0d3550" stroke-width="1.5"/>
  <rect x="377" y="462" width="18" height="16" fill="#e06666" stroke="#0d3550" stroke-width="0.8"/>
  <text x="401" y="476" font-size="7" fill="#b3261e">37-FA core</text>
  <line x1="358" y1="420" x2="414" y2="420" stroke="#b3261e" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="416" y="423" font-size="9" fill="#b3261e">RPV head ≈5 m below grade</text>

  <!-- seismic gap (RXB | TB) -->
  <line x1="448" y1="240" x2="448" y2="380" stroke="#0d3550" stroke-width="1" stroke-dasharray="2 1.5"/>
  <text x="448" y="236" font-size="8" fill="#0d3550" text-anchor="middle">seismic gap ≥75 mm</text>

  <!-- TB (turbine, amber, 15 m) -->
  <rect x="462" y="260" width="110" height="120" fill="#ffe8b3" stroke="#9a6700" stroke-width="1.5"/>
  <!-- TCES (green, 12 m) -->
  <rect x="590" y="284" width="110" height="96" fill="#d8f3dc" stroke="#2d6a4f" stroke-width="1.5"/>
  <!-- SOE (green, 10 m, H₂ generation) -->
  <rect x="718" y="300" width="92" height="80" fill="#d8f3dc" stroke="#2d6a4f" stroke-width="1.5"/>
  <!-- H₂ storage yard (SE corner, set back — shown at right, low) -->
  <rect x="900" y="332" width="80" height="48" fill="#ffdede" stroke="#b3261e" stroke-width="1.5"/>
  <text x="940" y="326" font-size="8" fill="#b3261e" text-anchor="middle">set back to SE corner</text>

  <!-- ===== H₂ stand-off (RXB → H₂) ===== -->
  <line x1="434" y1="510" x2="900" y2="510" stroke="#b3261e" stroke-width="1.2" stroke-dasharray="2 2"/>
  <path d="M434,508 l4,2 l-4,2 M900,508 l-4,2 l4,2" fill="#b3261e"/>
  <text x="667" y="504" font-size="11" fill="#b3261e" text-anchor="middle">H₂ stand-off ≈ 123 m (&gt; 100 m bound, NFPA 2 / RG 1.91)</text>

  <!-- ===== Building labels + heights ===== -->
  <g font-size="11" fill="#1b2a36" text-anchor="middle">
    <text x="200" y="252">SFB</text><text x="200" y="240" font-size="9" fill="#1b4965">15 m · Storage</text>
    <text x="386" y="132" font-weight="bold">RXB</text><text x="386" y="122" font-size="9" fill="#0d3550">30 m (+ below grade)</text>
    <text x="517" y="252">TB</text><text x="517" y="240" font-size="9" fill="#9a6700">15 m · 40 MWe</text>
    <text x="645" y="276">TCES</text><text x="645" y="264" font-size="9" fill="#2d6a4f">12 m · zeolite-13X</text>
    <text x="764" y="292">SOE</text><text x="764" y="280" font-size="9" fill="#2d6a4f">10 m · H₂ gen</text>
    <text x="940" y="324">H₂</text><text x="940" y="312" font-size="9" fill="#b3261e">6 m</text>
  </g>

  <!-- reactor cavity label -->
  <text x="386" y="490" font-size="9" fill="#0d3550" text-anchor="middle">reactor cavity (seismic + missile shield)</text>

  <!-- spine zone bands -->
  <g font-size="12" font-weight="bold">
    <text x="360" y="540" fill="#1b4965" text-anchor="middle">PROTECTED AREA (Cat I)</text>
    <text x="560" y="540" fill="#9a6700" text-anchor="middle">VITAL AREA (Cat II)</text>
    <text x="780" y="540" fill="#2d6a4f" text-anchor="middle">NON-SAFETY (cogen)</text>
  </g>

  <!-- Legend / note -->
  <g transform="translate(70,556)">
    <text x="0" y="14" font-size="10" fill="#55606a">Vertical to scale (8 px/m). Horizontal positions schematic — true plan layout is in site_plot_plan.png. Dome on RXB is indicative.</text>
  </g>
</svg>
