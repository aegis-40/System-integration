<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="780" viewBox="0 0 1180 780" font-family="Arial, Helvetica, sans-serif">
  <rect width="1180" height="780" fill="white"/>

  <!-- ===== Title block ===== -->
  <text x="30" y="34" font-size="22" font-weight="bold" fill="#1b2a36">Aegis-40 — Site Plot Plan (Compact In-Line Layout)</text>
  <text x="30" y="52" font-size="13" fill="#55606a">FER §8.10 R3 (facility layout) + R6 (critical piping). Scale 1:312 (3.2 px/m). North up.</text>
  <text x="30" y="68" font-size="11" fill="#9a6700">rev_4 / C1 resolved 2026-06-26 · single process spine Storage→Reactor→Turbine→TCES→SOE · once-through seawater · internal IRWST pool · bulk H₂ offset to SE corner</text>

  <!-- ===== Scaled drawing group: 1 user-unit = 1 m, scale(3.2) ===== -->
  <g transform="translate(40,82) scale(3.2)">

    <!-- shoreline / seawater band (south) -->
    <rect x="0" y="142" width="180" height="14" fill="#bfe6ec"/>
    <text x="6" y="151" font-size="3" fill="#16808c">BLACK SEA — once-through (intake + outfall)</text>

    <!-- Protected Area fence (nuclear block) -->
    <rect x="7" y="6" width="69" height="92" fill="none" stroke="#b3261e" stroke-width="0.8" stroke-dasharray="2.5 2" vector-effect="non-scaling-stroke"/>
    <text x="8" y="9.5" font-size="2.6" fill="#b3261e">PROTECTED AREA (Seismic Cat I)</text>
    <!-- Vital Area fence (turbine block) -->
    <rect x="66" y="53" width="56" height="64" fill="none" stroke="#9a6700" stroke-width="0.8" stroke-dasharray="2.5 2" vector-effect="non-scaling-stroke"/>
    <text x="68" y="56" font-size="2.6" fill="#9a6700">VITAL AREA (Cat II)</text>
    <!-- non-safety cogen tail caption -->
    <text x="101" y="48" font-size="2.6" fill="#2d6a4f">NON-SAFETY (cogen tail)</text>

    <!-- ====================== THE SPINE ====================== -->
    <!-- Nuclear-block spine buildings (blue) -->
    <g fill="#cfe8ff" stroke="#1b4965" stroke-width="1.5" vector-effect="non-scaling-stroke">
      <rect x="12" y="58" width="25" height="18"/>   <!-- SFB -->
    </g>
    <!-- RXB highlighted + containment circle + internal IRWST pool -->
    <rect x="40" y="52" width="25" height="25" fill="#aad4f5" stroke="#0d3550" stroke-width="2" vector-effect="non-scaling-stroke"/>
    <circle cx="52.5" cy="64.5" r="7.5" fill="#dff0fb" stroke="#0d3550" stroke-width="1" stroke-dasharray="2 1.5" vector-effect="non-scaling-stroke"/>
    <circle cx="52.5" cy="64.5" r="3.2" fill="#bfe6ec" stroke="#16808c" stroke-width="0.6" vector-effect="non-scaling-stroke"/>
    <circle cx="52.5" cy="64.5" r="1.6" fill="#7fb5e0" stroke="#0d3550" stroke-width="0.8"/>
    <!-- Turbine block (amber) -->
    <rect x="68" y="56" width="30" height="20" fill="#ffe8b3" stroke="#9a6700" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
    <!-- Cogen tail (green) -->
    <g stroke="#2d6a4f" stroke-width="1.5" vector-effect="non-scaling-stroke">
      <rect x="101" y="50" width="30" height="30" fill="#d8f3dc"/>   <!-- TCES -->
      <rect x="134" y="54" width="25" height="25" fill="#d8f3dc"/>   <!-- SOE -->
    </g>

    <!-- seismic gap marker (RXB | TB) -->
    <line x1="66.5" y1="50" x2="66.5" y2="78" stroke="#0d3550" stroke-width="0.8" stroke-dasharray="1.5 1.2" vector-effect="non-scaling-stroke"/>
    <text x="66.5" y="83.5" font-size="2.2" fill="#0d3550" text-anchor="middle">seismic gap ≥75 mm</text>

    <!-- transfer canal SFB<->RXB -->
    <rect x="37" y="65" width="3" height="3" fill="#d6ecfb" stroke="#2471a3" stroke-width="0.6" vector-effect="non-scaling-stroke"/>

    <!-- spine building labels -->
    <g font-size="3" fill="#0d3550" text-anchor="middle" font-weight="bold">
      <text x="24.5" y="68">SFB</text>
      <text x="52.5" y="51">RXB</text>
      <text x="83" y="67" fill="#5c3d00">TB</text>
      <text x="116" y="66" fill="#1d4634">TCES</text>
      <text x="146.5" y="67" fill="#1d4634">SOE</text>
    </g>
    <g font-size="2" fill="#33414d" text-anchor="middle">
      <text x="24.5" y="71.5">Storage</text>
      <text x="52.5" y="76">37-FA · int. IRWST</text>
      <text x="83" y="70.5">Turbine 40 MWe</text>
      <text x="116" y="69.5">zeolite-13X</text>
      <text x="146.5" y="70.5">H₂ gen</text>
    </g>

    <!-- ====================== NORTH FLANK ====================== -->
    <g fill="#cfe8ff" stroke="#1b4965" stroke-width="1.5" vector-effect="non-scaling-stroke">
      <rect x="12" y="10" width="25" height="15"/>   <!-- WMB -->
      <rect x="12" y="31" width="25" height="18"/>   <!-- AB -->
      <rect x="42" y="22" width="30" height="24"/>   <!-- CB -->
    </g>
    <circle cx="34.5" cy="12" r="1" fill="#0d3550"/>
    <text x="36" y="13" font-size="2" fill="#0d3550">off-gas stack ≥30 m</text>
    <g font-size="3" fill="#0d3550" text-anchor="middle" font-weight="bold">
      <text x="24.5" y="18">WMB</text><text x="24.5" y="41">AB</text><text x="57" y="33">CB</text>
    </g>
    <text x="57" y="37" font-size="2" fill="#33414d" text-anchor="middle">MCR · I&amp;C A–D</text>

    <!-- ====================== SOUTH FLANK ====================== -->
    <rect x="42" y="84" width="15" height="10" fill="#cfe8ff" stroke="#1b4965" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
    <text x="49.5" y="90" font-size="2.6" fill="#0d3550" text-anchor="middle" font-weight="bold">DGB</text>
    <!-- switchyard + transformers (south of TB) -->
    <rect x="68" y="86" width="50" height="28" fill="#fff3d6" stroke="#9a6700" stroke-width="1.2" vector-effect="non-scaling-stroke"/>
    <rect x="71" y="89" width="4" height="3.2" fill="#8a929b"/><rect x="71" y="94" width="4" height="3.2" fill="#8a929b"/>
    <text x="93" y="101" font-size="3" fill="#5c3d00" text-anchor="middle" font-weight="bold">Switchyard + Main Xfmrs</text>
    <text x="93" y="105" font-size="2.2" fill="#5c3d00" text-anchor="middle">50 MVA · 33 kV</text>
    <!-- CWP toward shore -->
    <rect x="84" y="118" width="12" height="8" fill="#cfe8ff" stroke="#1b4965" stroke-width="1.2" vector-effect="non-scaling-stroke"/>
    <text x="90" y="123" font-size="2.4" fill="#0d3550" text-anchor="middle">CWP</text>
    <!-- WSB SE -->
    <rect x="134" y="88" width="20" height="14" fill="#ededed" stroke="#888" stroke-width="1.2" vector-effect="non-scaling-stroke"/>
    <text x="144" y="96" font-size="2.6" fill="#444" text-anchor="middle">WSB</text>

    <!-- ====================== H₂ STORAGE YARD (SE corner, set back) ====================== -->
    <rect x="150" y="118" width="24" height="20" fill="#ffdede" stroke="#b3261e" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
    <path d="M150,118 L174,138 M150,125 L167,138 M150,132 L159,138 M157,118 L174,135" stroke="#b3261e" stroke-width="0.5" vector-effect="non-scaling-stroke" opacity="0.5"/>
    <text x="162" y="126" font-size="2.8" fill="#b3261e" text-anchor="middle" font-weight="bold">H₂ STORAGE</text>
    <text x="162" y="130" font-size="2.2" fill="#b3261e" text-anchor="middle">NFPA 2 · set back</text>
    <!-- stand-off line RXB -> H2 -->
    <line x1="52.5" y1="64.5" x2="162" y2="128" stroke="#b3261e" stroke-width="0.7" stroke-dasharray="3 2" vector-effect="non-scaling-stroke"/>
    <text x="112" y="98" font-size="2.6" fill="#b3261e" transform="rotate(30 112 98)">H₂ stand-off ≈ 123 m (&gt;100 m bound)</text>

    <!-- ====================== PROCESS LINES ====================== -->
    <!-- main-steam / process-heat corridor along the spine -->
    <line x1="65" y1="63" x2="134" y2="63" stroke="#c0392b" stroke-width="1.4" vector-effect="non-scaling-stroke"/>
    <polygon points="134,63 131,61.6 131,64.4" fill="#c0392b"/>
    <text x="99" y="61.5" font-size="2.4" fill="#c0392b" text-anchor="middle">main steam → TB → process heat → TCES/SOE</text>
    <!-- feedwater return -->
    <line x1="68" y1="74" x2="65" y2="74" stroke="#2471a3" stroke-width="1.2" vector-effect="non-scaling-stroke"/>
    <!-- generator output to switchyard -->
    <line x1="88" y1="76" x2="88" y2="86" stroke="#cc9900" stroke-width="1.2" vector-effect="non-scaling-stroke"/>
    <!-- condenser circ-water TB -> CWP -> sea -->
    <line x1="90" y1="76" x2="90" y2="118" stroke="#16808c" stroke-width="1.2" vector-effect="non-scaling-stroke"/>
    <line x1="90" y1="126" x2="90" y2="142" stroke="#16808c" stroke-width="1.2" stroke-dasharray="2 1.5" vector-effect="non-scaling-stroke"/>
    <text x="92" y="135" font-size="2.2" fill="#16808c">circ water → sea</text>

    <!-- EPZ note -->
    <text x="6" y="139" font-size="2.6" fill="#55606a">Whole site ~160 × 120 m — comfortably inside the 500 m EPZ</text>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(880,120)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#1b2a36">Zones</text>
    <rect x="0" y="10" width="16" height="11" fill="#cfe8ff" stroke="#1b4965"/><text x="22" y="19" font-size="11">Nuclear (Cat I, Protected Area)</text>
    <rect x="0" y="26" width="16" height="11" fill="#ffe8b3" stroke="#9a6700"/><text x="22" y="35" font-size="11">Turbine (Cat II, Vital Area)</text>
    <rect x="0" y="42" width="16" height="11" fill="#d8f3dc" stroke="#2d6a4f"/><text x="22" y="51" font-size="11">Cogen tail (non-safety)</text>
    <rect x="0" y="58" width="16" height="11" fill="#ffdede" stroke="#b3261e"/><text x="22" y="67" font-size="11">H₂ (NFPA 2, set back)</text>
    <rect x="0" y="74" width="16" height="11" fill="#bfe6ec" stroke="#16808c"/><text x="22" y="83" font-size="11">Seawater / IRWST pool</text>

    <text x="0" y="108" font-size="14" font-weight="bold" fill="#1b2a36">Lines</text>
    <line x1="0" y1="118" x2="18" y2="118" stroke="#c0392b" stroke-width="2.5"/><text x="24" y="122" font-size="11">Main steam / process heat</text>
    <line x1="0" y1="134" x2="18" y2="134" stroke="#16808c" stroke-width="2.5"/><text x="24" y="138" font-size="11">Circulating water → sea</text>
    <line x1="0" y1="150" x2="18" y2="150" stroke="#cc9900" stroke-width="2.5"/><text x="24" y="154" font-size="11">Generator output</text>
    <line x1="0" y1="166" x2="18" y2="166" stroke="#b3261e" stroke-width="2" stroke-dasharray="4 3"/><text x="24" y="170" font-size="11">H₂ stand-off (~123 m)</text>

    <text x="0" y="200" font-size="14" font-weight="bold" fill="#1b2a36">Spine (W→E)</text>
    <text x="0" y="218" font-size="11" fill="#33414d">SFB → RXB → ⟂gap → TB → TCES → SOE</text>
    <text x="0" y="234" font-size="11" fill="#33414d">North flank: WMB · AB · CB</text>
    <text x="0" y="250" font-size="11" fill="#33414d">South flank: DGB · switchyard · CWP · WSB</text>

    <text x="0" y="284" font-size="14" font-weight="bold" fill="#1b2a36">Buildings</text>
    <g font-size="10.5" fill="#33414d">
      <text x="0" y="302">SFB Storage/Spent Fuel · 450 m²</text>
      <text x="0" y="318">RXB Reactor + int. IRWST · 625 m²</text>
      <text x="0" y="334">TB Turbine 40 MWe · 600 m²</text>
      <text x="0" y="350">TCES zeolite-13X · 900 m² [ALISHER]</text>
      <text x="0" y="366">SOE Electrolyser · 625 m² [ALISHER]</text>
      <text x="0" y="382">CB Control/MCR · 750 m² · AB 500 · WMB 375</text>
      <text x="0" y="398">DGB 150 · Switchyard 2650 · CWP 240 · WSB 300</text>
      <text x="0" y="414">H₂ Storage Yard · 600 m² (SE corner)</text>
    </g>
  </g>

  <!-- ===== Scale bar + north arrow ===== -->
  <g transform="translate(40,720)">
    <line x1="0" y1="0" x2="160" y2="0" stroke="#1b2a36" stroke-width="2"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#1b2a36" stroke-width="2"/>
    <line x1="160" y1="-5" x2="160" y2="5" stroke="#1b2a36" stroke-width="2"/>
    <text x="80" y="18" font-size="11" text-anchor="middle" fill="#1b2a36">50 m</text>
  </g>
  <g transform="translate(1110,150)">
    <polygon points="0,-22 6,8 0,2 -6,8" fill="#1b2a36"/>
    <text x="0" y="24" font-size="13" font-weight="bold" text-anchor="middle" fill="#1b2a36">N</text>
  </g>

  <text x="40" y="752" font-size="10" fill="#55606a">Compact in-line spine (C1 resolved 2026-06-26). Detailed building schedule + separations: planning/COMPACT_LAYOUT_PROPOSAL.md · positions schematic, await survey.</text>
</svg>
