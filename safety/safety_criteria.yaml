# Aegis-40 Safety Criteria
# ============================================================================
# Spine document. Every safety claim in the FER §8.5–§8.7 traces to a row here.
# Schema:
#   id              : kebab-case unique key
#   parameter       : human-readable name
#   limit_value     : numeric limit (or list for bounded ranges)
#   unit            : SI unit
#   direction       : "<=" | ">=" | "==" | "range"
#   type            : hard_constraint | operating_limit | target
#                       - hard_constraint  -> breach => wFOM = -inf, design REJECTED
#                       - operating_limit  -> breach => trip/scram, not a design failure
#                       - target           -> aspirational, contributes to wFOM score
#   source          : regulatory citation
#   normalizer      : log_ratio | min_max | target_gaussian (per MEETING_BRIEF §2.3)
#   normalizer_params: dict of params for the normalizer (target, alpha, min, max)
#   fom_param       : matching field name in fom_inputs.yaml
#   sensor_chain    : how this is measured / observed
#   setpoint_link   : id of the trip in trip_signals.md that protects this limit (if any)
#   defense_in_depth_level: 1..5 (IAEA SSR-2/1 Rev 1 §2.13)
#   notes           : caveats, assumptions, references
# ============================================================================

design_id: aegis40-rev_0
schema_version: 0.1
last_updated: 2026-06-15
owner: Azamhon (3S / I&C / FOM)
reactor_type: 40 MWe / 125 MWth integral PWR (iPWR) cogen

# ---------------------------------------------------------------------------
# 1. REACTIVITY & NEUTRONIC SAFETY
# ---------------------------------------------------------------------------
criteria:

  - id: k_eff_operating
    parameter: "Operating k-effective"
    limit_value: 1.000
    tolerance: 0.0005          # ±50 pcm operational band
    unit: "-"
    direction: "=="
    type: operating_limit
    source: "IAEA SSR-2/1 Rev 1 Req 46; NRC GDC-26"
    normalizer: target_gaussian
    normalizer_params: {target: 1.000, alpha: 1.0e5}
    fom_param: from_openmc.k_eff_bol
    sensor_chain: ["power-range neutron flux 4ch", "core exit T inference"]
    setpoint_link: high_flux_trip
    defense_in_depth_level: 1
    notes: "Steady-state criticality. rev_3 (2026-06-03) BOL k_eff = 1.0264 (~+2640 pcm excess) held down by hybrid Gd+Er burnable absorber + control rods (ARO worth 15226 pcm; cold SDM 12.4%). See safety/openmc_rev3_alignment.md."

  - id: shutdown_margin
    parameter: "Shutdown margin (most reactive rod stuck out)"
    limit_value: 0.01           # 1 % Δk/k
    unit: "Δk/k"
    direction: ">="
    type: hard_constraint
    source: "NRC SRP 4.3, IAEA SSG-52"
    normalizer: log_ratio
    fom_param: from_openmc.shutdown_margin_dk_pct
    sensor_chain: ["control rod position indication", "post-trip neutron flux"]
    setpoint_link: null         # protected by design, not by trip
    defense_in_depth_level: 3
    notes: "Required at all times including refueling. To be confirmed by ARO (all-rods-in minus one) OpenMC case — Samira W1 task 6."

  - id: mtc_full_power
    parameter: "Moderator Temperature Coefficient at full power"
    limit_value: 0
    unit: "pcm/K"
    direction: "<"
    type: hard_constraint
    source: "NRC GDC-11; IAEA SSR-2/1 Req 46"
    normalizer: target_gaussian
    normalizer_params: {target: -40, alpha: 1.0e-3}    # nominal -40 pcm/K
    fom_param: from_openmc.mtc_full_power_pcm_per_K
    sensor_chain: ["inferred from RTD T_avg + flux trend"]
    setpoint_link: null
    defense_in_depth_level: 1
    notes: "Strictly negative at all power levels. HIGA + 3-zone UO₂ should give MTC < 0. Awaiting Samira W1 task 3 sweep."

  - id: dtc_doppler
    parameter: "Doppler (fuel temperature) coefficient"
    limit_value: 0
    unit: "pcm/K"
    direction: "<"
    type: hard_constraint
    source: "NRC GDC-11"
    normalizer: target_gaussian
    normalizer_params: {target: -3.0, alpha: 0.1}
    fom_param: from_openmc.dtc_pcm_per_K
    sensor_chain: ["fuel performance model + flux"]
    setpoint_link: null
    defense_in_depth_level: 1
    notes: "Negative DTC ensures inherent transient suppression. UO₂ guarantees DTC < 0; quantify via Samira's sweep."

  - id: void_coefficient
    parameter: "Void coefficient of reactivity"
    limit_value: 0
    unit: "pcm/% void"
    direction: "<"
    type: hard_constraint
    source: "NRC GDC-11"
    normalizer: target_gaussian
    normalizer_params: {target: -50, alpha: 1.0e-3}
    fom_param: from_openmc.void_coeff_pcm_per_pct
    sensor_chain: ["void fraction model + flux"]
    setpoint_link: null
    defense_in_depth_level: 1
    notes: "Under-moderated PWR lattice ensures negative void. Confirm via Samira W1 task 4."

  - id: control_rod_worth_aro
    parameter: "All-Rods-Out integral worth"
    limit_value: 0.05           # ~5000 pcm minimum total worth
    unit: "Δk/k"
    direction: ">="
    type: operating_limit
    source: "NRC SRP 4.3; iPWR practice"
    normalizer: log_ratio
    fom_param: from_openmc.control_rod_worth_aro_pcm
    sensor_chain: ["differential rod worth measurement at startup"]
    setpoint_link: null
    defense_in_depth_level: 3
    notes: "Enables hot shutdown without boration. Samira W1 task 6 = all-rods-in case."

  - id: max_reactivity_insertion_rate
    parameter: "Maximum reactivity insertion rate"
    limit_value: 0.00075        # 75 pcm/s typical iPWR
    unit: "Δk/k per s"
    direction: "<="
    type: hard_constraint
    source: "ANSI/ANS-58.21; uncontrolled-rod-withdrawal envelope"
    normalizer: target_gaussian
    normalizer_params: {target: 0.0, alpha: 1.0e6}
    fom_param: from_openmc.max_reactivity_rate
    sensor_chain: ["rod speed limit interlock"]
    setpoint_link: high_flux_rate_trip
    defense_in_depth_level: 2
    notes: "Accident basis = uncontrolled rod WITHDRAWAL (AOO). Rod EJECTION eliminated by design — internal (in-vessel) CRDMs confirmed 2026-06-12 (openmc_rev3_alignment.md s4). rev_3 as-run 1.5e-5 = 50x margin."

  - id: independent_shutdown_systems
    parameter: "Diverse & independent reactor shutdown systems"
    limit_value: 2
    unit: "count"
    direction: ">="
    type: hard_constraint
    source: "IAEA SSR-2/1 Rev 1 Req 46 §6.9 (≥2 diverse+independent systems); §6.10 (≥1 alone subcritical at most reactive state); §6.8 (CCF of insertion)"
    normalizer: min_max
    normalizer_params: {min: 0, max: 2}
    fom_param: derived_safety.independent_shutdown_systems
    sensor_chain: ["design-document audit", "ARO/stuck-rod OpenMC cases", "EBIS tank level + boron concentration"]
    setpoint_link: ebis_actuation
    defense_in_depth_level: 3
    notes: "**RESOLVED 2026-06-15 (was GAP vs SSR-2/1 Req 46 §6.9).** Count = 2: (1) gravity-drop control rods (primary; cold SDM 12.4%, stuck-rod compliant), (2) **Emergency Boron Injection System (EBIS)** — a passive, diverse, shutdown-only borated-water system (see trip_signals.md E6 + FER §8.6.2a). Diversity satisfied (chemical poison vs mechanical rod → no shared insertion CCF, §6.8). §6.10: EBIS sized so it ALONE reaches cold subcritical at the most reactive condition [SIM-PENDING — Samira to size boron mass/concentration via OpenMC borated-core case]. Design philosophy preserved: NO soluble boron for reactivity control in normal operation (boron-dilution accident stays eliminated); EBIS is isolated/dormant, armed only on ATWS via the DAS. Note: SBF burnable absorber (Gd/Er) is fixed hold-down, NOT counted as a shutdown system. See open_item shutdown_second_system (now sizing-only)."

# ---------------------------------------------------------------------------
# 2. THERMAL-HYDRAULIC SAFETY (clad integrity, DNB, fuel)
# ---------------------------------------------------------------------------

  - id: mdnbr_steady
    parameter: "Minimum DNBR — steady state"
    limit_value: 1.3
    unit: "-"
    direction: ">="
    type: hard_constraint
    source: "NUREG-0800 SRP 4.4; W-3 correlation"
    normalizer: target_gaussian
    normalizer_params: {target: 2.0, alpha: 1.0}
    fom_param: from_openfoam.mdnbr_steady
    sensor_chain: ["primary flow + core ΔT + flux distribution"]
    setpoint_link: low_flow_trip
    defense_in_depth_level: 1
    notes: "First wall of CSFs (Critical Safety Functions). OpenFOAM W1 task 4 = first hot-channel run."

  - id: mdnbr_transient
    parameter: "MDNBR — anticipated operational occurrences (AOO)"
    limit_value: 1.3
    unit: "-"
    direction: ">="
    type: hard_constraint
    source: "NUREG-0800 SRP 15.0; 10 CFR 50 App A GDC-10"
    normalizer: target_gaussian
    normalizer_params: {target: 1.8, alpha: 2.0}
    fom_param: from_openfoam.mdnbr_aoo
    sensor_chain: ["transient sim hot-channel"]
    setpoint_link: over_temp_dt_trip
    defense_in_depth_level: 2

  - id: pct_loca
    parameter: "Peak Clad Temperature — LOCA"
    limit_value: 1204            # 2200 °F
    unit: "°C"
    direction: "<="
    type: hard_constraint
    source: "10 CFR 50.46(b)(1); IAEA SSR-2/1 Req 17"
    normalizer: target_gaussian
    normalizer_params: {target: 600, alpha: 5.0e-6}
    fom_param: from_openfoam.hot_channel_pct_loca_C
    sensor_chain: ["core exit thermocouples (post-accident)", "fuel performance"]
    setpoint_link: high_outlet_t_trip
    defense_in_depth_level: 2
    notes: "Hard ceiling. Operating PCT << 1204 °C. Per MEETING_BRIEF §4 row 5: Gaussian center 600 °C / α 5e-6."

  - id: cladding_oxidation
    parameter: "Maximum cladding oxidation"
    limit_value: 0.17            # 17 % ECR
    unit: "fraction of clad thickness"
    direction: "<="
    type: hard_constraint
    source: "10 CFR 50.46(b)(2)"
    normalizer: target_gaussian
    normalizer_params: {target: 0.0, alpha: 50.0}
    fom_param: from_openfoam.clad_oxidation_max
    sensor_chain: ["fuel performance code (e.g. FRAPCON post-process)"]
    setpoint_link: null
    defense_in_depth_level: 2

  - id: hydrogen_generation
    parameter: "Core-wide hydrogen generation (Zr-water rxn)"
    limit_value: 0.01            # 1 % of theoretical max
    unit: "fraction"
    direction: "<="
    type: hard_constraint
    source: "10 CFR 50.46(b)(3)"
    normalizer: target_gaussian
    normalizer_params: {target: 0.0, alpha: 1000.0}
    fom_param: from_openfoam.h2_generation_fraction
    sensor_chain: ["post-LOCA inference"]
    setpoint_link: null
    defense_in_depth_level: 2

  - id: fuel_centerline_temperature
    parameter: "Fuel centerline temperature (steady state)"
    limit_value: 2590            # UO₂ melting margin
    unit: "°C"
    direction: "<"
    type: hard_constraint
    source: "ANS / fuel performance limit; NRC SRP 4.2"
    normalizer: target_gaussian
    normalizer_params: {target: 1400, alpha: 1.0e-6}
    fom_param: from_openfoam.fuel_centerline_max_C
    sensor_chain: ["fuel performance model"]
    setpoint_link: over_power_dt_trip
    defense_in_depth_level: 1

  - id: f_delta_h_radial
    parameter: "Nuclear enthalpy-rise hot-channel factor F_ΔH^N"
    limit_value: 1.65           # CFΔH at full power (P=1); LCO = 1.65·[1+0.3·(1−P)]
    unit: "-"
    direction: "<="
    type: hard_constraint
    source: "NUREG-1431 Rev 5 LCO 3.2.2; IAEA SSG-52 §6 (core power distribution); NUREG-0800 SRP 4.4"
    normalizer: target_gaussian
    normalizer_params: {target: 1.55, alpha: 1.0}
    fom_param: from_openmc.f_delta_h
    sensor_chain: ["in-core flux map (movable detectors / SPNDs)", "loading-pattern verification"]
    setpoint_link: over_temp_dt_trip
    defense_in_depth_level: 1
    notes: "Radial peaking of the integrated pin power; drives MDNBR directly. **FLAG: rev_3 as-run OpenMC F_ΔH = 2.268 EXCEEDS the 1.65 LCO by ~37%** (safety/openmc_rev3_alignment.md / OpenMC summary_report.txt 2026-06-03). The 3D notebook COMPUTES this (diagnostic `radial_peaking_FdeltaH`) but does NOT gate it — absent from notebook SAFETY_LIMITS, so it never showed FAIL. Caveat: value is a raw RegularMesh pin tally (cell 1.27 cm vs pin pitch 1.2623 cm → aliasing + inter-FA water gaps can inflate). Re-run with a pin-aligned lattice tally and engineering uncertainty factors before treating as final. See open_item peaking_recompute."

  - id: f_q_total
    parameter: "Total heat-flux hot-channel (peaking) factor F_Q(Z)"
    limit_value: 2.50           # CFQ at full power; LCO = [CFQ/P]·K(Z)
    unit: "-"
    direction: "<="
    type: hard_constraint
    source: "NUREG-1431 Rev 5 LCO 3.2.1; 10 CFR 50.46(b) (LOCA PCT/LHGR basis); IAEA SSG-52 §6; NUREG-0800 SRP 4.3"
    normalizer: target_gaussian
    normalizer_params: {target: 2.30, alpha: 1.0}
    fom_param: from_openmc.f_q
    sensor_chain: ["in-core flux map (axial + radial)", "loading-pattern verification"]
    setpoint_link: over_power_dt_trip
    defense_in_depth_level: 1
    notes: "3D total peaking (F_xy·F_z); sets peak linear heat rate → LOCA PCT and centerline-melt margins. **FLAG: rev_3 as-run OpenMC F_q = 3.478 EXCEEDS the 2.50 LCO by ~39%** (diagnostic `pin_peaking_factor_Fq`). Same gating gap and same mesh-aliasing caveat as f_delta_h_radial. If confirmed after pin-aligned re-tally, the SBF Gd-zoned loading needs de-peaking (split Gd zoning / pin-level enrichment grading / IFBA) before DNBR and LOCA limits can be met. See open_item peaking_recompute."

# ---------------------------------------------------------------------------
# 3. PRIMARY / SECONDARY PRESSURE BOUNDARY
# ---------------------------------------------------------------------------

  - id: primary_pressure_design
    parameter: "Primary system pressure — design limit"
    limit_value: 17.2
    unit: "MPa"
    direction: "<="
    type: hard_constraint
    source: "ASME Section III NB; 110 % of operating P"
    normalizer: target_gaussian
    normalizer_params: {target: 15.5, alpha: 0.1}
    fom_param: from_openfoam.primary_pressure_MPa
    sensor_chain: ["pressurizer pressure xmtr 4× (Class 1E)"]
    setpoint_link: high_pressurizer_p_trip
    defense_in_depth_level: 2
    notes: "Nominal operating ~15.5 MPa. Design ~17.2 MPa = 110 % of operating per ASME margin."

  - id: containment_pressure
    parameter: "Containment design pressure"
    limit_value: 0.414           # 4.14 bar per FER Table 1
    unit: "MPa"
    direction: "<="
    type: hard_constraint
    source: "FER Template Table 1; IAEA SSR-2/1 Req 56"
    normalizer: target_gaussian
    normalizer_params: {target: 0.1, alpha: 5.0}
    fom_param: from_openfoam.containment_pressure_peak_MPa
    sensor_chain: ["containment pressure xmtr 4×"]
    setpoint_link: high_containment_p_trip
    defense_in_depth_level: 3
    notes: "Dry containment per template. Peak LOCA P must stay below design."

  - id: sg_pressure_operating
    parameter: "Steam generator operating pressure"
    limit_value: 7.17
    tolerance: 0.2
    unit: "MPa"
    direction: "=="
    type: operating_limit
    source: "FER Template Table 1"
    normalizer: target_gaussian
    normalizer_params: {target: 7.17, alpha: 0.5}
    fom_param: from_openfoam.sg_pressure_MPa
    sensor_chain: ["SG pressure xmtr"]
    setpoint_link: null
    defense_in_depth_level: 1

# ---------------------------------------------------------------------------
# 4. DECAY HEAT REMOVAL & PASSIVE SAFETY (USP of iPWR)
# ---------------------------------------------------------------------------

  - id: operator_grace_period
    parameter: "Operator action grace period (no AC, no AC/DC, no makeup)"
    limit_value: 72              # hours minimum; target = unlimited
    unit: "h"
    direction: ">="
    type: target
    source: "IAEA SSG-39; NRC SECY-10-0034 (SMR policy)"
    normalizer: log_ratio
    fom_param: derived_safety.passive_decay_heat_removal_grace_h
    sensor_chain: ["passive PCCS + IRWST inventory tracking"]
    setpoint_link: null
    defense_in_depth_level: 4
    notes: "Aegis-40 targets 'unlimited' (cap at 720 h per MEETING_BRIEF §4 row 9). Selling point in FER §8.6."

  - id: prhr_capacity
    parameter: "Passive Residual Heat Removal capacity vs decay heat"
    limit_value: 1.05            # 105 % decay heat at 1 s after scram
    unit: "ratio"
    direction: ">="
    type: hard_constraint
    source: "ANS-5.1 decay heat curve; IAEA SSR-2/1 Req 53"
    normalizer: log_ratio
    fom_param: from_openfoam.prhr_capacity_ratio
    sensor_chain: ["PRHR HX outlet T + flow"]
    setpoint_link: null
    defense_in_depth_level: 3

  - id: sbf_diversity_count
    parameter: "Diverse safety-by-function principles"
    limit_value: 5
    unit: "count"
    direction: ">="
    type: target
    source: "MEETING_BRIEF §4 row 10"
    normalizer: min_max
    normalizer_params: {min: 0, max: 7}
    fom_param: derived_safety.sbf_diversity_count
    sensor_chain: ["design-document audit"]
    setpoint_link: null
    defense_in_depth_level: 4
    notes: "Approved list (MEETING_BRIEF §4): gravity, natural circulation, condensation, conduction, evaporation, capillary, pressure suppression. Count those used by Aegis-40 passive systems."

# ---------------------------------------------------------------------------
# 5. RADIOLOGICAL & SITE
# ---------------------------------------------------------------------------

  - id: epz_radius
    parameter: "Emergency Planning Zone radius"
    limit_value: 0.5
    unit: "km"
    direction: "<="
    type: target
    source: "FER Template Table 1; NRC RG 1.242"
    normalizer: log_ratio
    fom_param: from_layout_economics.epz_km
    sensor_chain: ["source-term + atmospheric dispersion analysis"]
    setpoint_link: null
    defense_in_depth_level: 5
    notes: "SMR small EPZ is a competitive lever. Target ≤ 300 m if source term allows."

  - id: occupational_collective_dose
    parameter: "Annual occupational collective dose"
    limit_value: 0.5
    unit: "person-Sv/yr"
    direction: "<="
    type: target
    source: "IAEA SSR-2/1 Rev 1 Req 5 (radiation protection in design, ALARA); IAEA GSR Part 3"
    normalizer: log_ratio
    fom_param: derived_safety.occupational_collective_dose_personSv
    sensor_chain: ["area + personnel dosimetry program", "dose-rate zoning map"]
    setpoint_link: null
    defense_in_depth_level: 5
    notes: "Req 5 ALARA design feature (2026-06-15 audit). Target <0.5 person-Sv/yr (advanced-PWR class). ALARA design measures: cobalt-free materials in the primary circuit, shielded/remote maintenance of high-dose components (SG, CVCS, radwaste), dose-rate zoning built on layout/zones.md. [ANALYSIS-PENDING — collective-dose estimate + zoning map]."

  - id: dose_site_boundary
    parameter: "Whole-body dose at site boundary (worst-case LOCA, 0–2 h)"
    limit_value: 0.25            # 25 rem TEDE
    unit: "Sv"
    direction: "<="
    type: hard_constraint
    source: "10 CFR 100.11; 10 CFR 50.34(a)(1)"
    normalizer: target_gaussian
    normalizer_params: {target: 0.01, alpha: 10.0}
    fom_param: derived_safety.dose_boundary_Sv
    sensor_chain: ["radiation monitors site boundary + plume model"]
    setpoint_link: null
    defense_in_depth_level: 5

  - id: cdf
    parameter: "Core Damage Frequency (PRA, internal events)"
    limit_value: 1.0e-7
    unit: "1/reactor-year"
    direction: "<="
    type: target
    source: "FER Template Table 1; NRC RG 1.174"
    normalizer: log_ratio
    fom_param: derived_safety.cdf
    sensor_chain: ["Level 1 PRA model"]
    setpoint_link: null
    defense_in_depth_level: 5

  - id: lrf
    parameter: "Large Release Frequency"
    limit_value: 1.0e-8
    unit: "1/reactor-year"
    direction: "<="
    type: target
    source: "FER Template Table 1; NRC RG 1.174"
    normalizer: log_ratio
    fom_param: derived_safety.lrf
    sensor_chain: ["Level 2 PRA model"]
    setpoint_link: null
    defense_in_depth_level: 5

# ---------------------------------------------------------------------------
# 6. SEISMIC / EXTERNAL
# ---------------------------------------------------------------------------

  - id: sse_design
    parameter: "Safe Shutdown Earthquake design"
    limit_value: 0.3
    unit: "g"
    direction: ">="
    type: hard_constraint
    source: "FER Template Table 1; NRC RG 1.60; IAEA SSG-9"
    normalizer: log_ratio
    fom_param: from_layout_economics.sse_g
    sensor_chain: ["site response spectrum"]
    setpoint_link: null
    defense_in_depth_level: 4

# ---------------------------------------------------------------------------
# 7. FUEL CYCLE & LIFETIME
# ---------------------------------------------------------------------------

  - id: fuel_burnup_max
    parameter: "Discharge burnup (peak rod)"
    limit_value: 62              # GWd/MTU (NRC licensed limit for UO₂/Zr-4)
    unit: "GWd/MTU"
    direction: "<="
    type: operating_limit
    source: "NRC SRP 4.2 (62 GWd/MTU rod-avg); ANS"
    normalizer: log_ratio
    fom_param: from_openmc.burnup_discharge_GWd_per_MTU
    sensor_chain: ["depletion sim (Serpent/OpenMC)"]
    setpoint_link: null
    defense_in_depth_level: 1
    notes: "Target ~50 GWd/MTU per FER Table 1. Hard NRC ceiling 62. Awaiting Samira long-depletion sweep."

  - id: fuel_enrichment_max
    parameter: "Maximum U-235 enrichment"
    limit_value: 5.0             # LWR limit (without LEU+ license)
    unit: "% wt U-235"
    direction: "<="
    type: hard_constraint
    source: "10 CFR 50 enrichment limit (commercial LWR)"
    normalizer: target_gaussian
    normalizer_params: {target: 4.0, alpha: 1.0}
    fom_param: from_openmc.enrichment_max_pct
    sensor_chain: ["fuel spec sheet"]
    setpoint_link: null
    defense_in_depth_level: 1
    notes: "rev_3 (2026-06-03): 3-zone 4.95 / 4.70 / 4.40 wt% (max 4.95). Supersedes the 2.6/3.0/3.4 baseline — relaxed for high burnup. Max 4.95 leaves only 0.05 wt% to the 5.0 LEU ceiling (tight — flag in FER). See safety/openmc_rev3_alignment.md."

  - id: cycle_length
    parameter: "Cycle length"
    limit_value: 365             # EFPD; iPWR target ≥ 12 months
    unit: "EFPD"
    direction: ">="
    type: target
    source: "FER Template Table 1 (12–24 month reload interval)"
    normalizer: log_ratio
    fom_param: from_openmc.cycle_length_efpd
    sensor_chain: ["depletion sim to k_eff = 1 + leakage"]
    setpoint_link: null
    defense_in_depth_level: 0

# ---------------------------------------------------------------------------
# 8. COGENERATION INTERFACE (SSR-2/1 Req 35) — Aegis-40 is a cogen plant
#    (TES district heating + SOE hydrogen). Req 35 applies and was previously
#    unaddressed (2026-06-15 audit).
# ---------------------------------------------------------------------------

  - id: cogen_radionuclide_isolation
    parameter: "Independent barriers preventing radionuclide transport to heat/H₂ utilization units"
    limit_value: 2
    unit: "count"
    direction: ">="
    type: hard_constraint
    source: "IAEA SSR-2/1 Rev 1 Req 35 (no radionuclide transport to district-heating / desalination units in operational states AND accident conditions)"
    normalizer: min_max
    normalizer_params: {min: 0, max: 3}
    fom_param: derived_safety.cogen_isolation_barriers
    sensor_chain: ["intermediate-loop activity monitor", "interface ΔP monitor", "product-stream radiation monitor (district heat return, H₂)"]
    setpoint_link: null
    defense_in_depth_level: 3
    notes: "**RESOLVED 2026-06-15 (was GAP vs SSR-2/1 Req 35).** Count = 3 barriers: (1) SG tube wall, (2) non-radioactive intermediate-loop boundary, (3) customer-side HX wall — see layout/aux_systems.md §9a. Intermediate loop held at HIGHER pressure than the reactor-side stream at each interface HX → any leak flows inward (clean→reactor), never outward. Accident-condition isolation (the 2nd half of Req 35): fail-closed ESFAS valves on high intermediate-loop/product activity, SGTR signal, or containment isolation. Tritium is the governing nuclide for the SOE high-T (~800°C) interface → permeation-barrier coatings + H₂-product tritium monitor + intermediate-loop getter [ANALYSIS-PENDING budget]. See open_item cogen_isolation_design (now tritium-budget only)."

# ---------------------------------------------------------------------------
# DEFENSE IN DEPTH SUMMARY (cross-cut, IAEA SSR-2/1 Rev 1 §2.13)
# ---------------------------------------------------------------------------

defense_in_depth_levels:
  1:
    name: "Prevention of abnormal operation and failures"
    aegis40_features: ["Negative MTC/DTC/void", "Conservative MDNBR margin", "HIGA self-regulating burnable absorber"]
  2:
    name: "Control of abnormal operation and detection of failures"
    aegis40_features: ["RPS 2/4 voting", "Anticipated transient trip envelope", "Pressurizer relief"]
  3:
    name: "Control of accidents within design basis"
    aegis40_features: ["Passive ECCS x3 (per FER Table 1)", "PRHR / IRWST", "Containment isolation x3"]
  4:
    name: "Control of severe plant conditions, prevention of accident progression"
    aegis40_features: ["72 h+ grace period", "Passive containment cooling x3", "Diverse SBF principles (≥5)"]
  5:
    name: "Mitigation of radiological consequences"
    aegis40_features: ["EPZ ≤ 0.5 km", "Site boundary dose < 0.25 Sv", "CDF < 1e-7, LRF < 1e-8"]

