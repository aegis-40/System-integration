    notes: "**ADDED 2026-06-19 (coastal Sinop site).** Once-through seawater on the Black Sea coast introduces extreme-sea-level, storm-surge and tsunami as design-basis external events, plus marine intake blockage (biofouling, jellyfish/algal bloom, debris, ice) as a CCF candidate for the NORMAL heat sink. Provision: safety SSCs on dry-site grade above the design-basis flood level (DBFL); intake protected by breakwater + redundant travelling screens + chlorination (Akkuyu practice). Intake-blockage CCF is bounded by ultimate_heat_sink (safety function does not depend on seawater). [ANALYSIS-PENDING — Sinop coastal hazard study; ties to hazards_register.md H5]."

