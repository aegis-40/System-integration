decisions_locked:
  - id: clad_material
    decision: "Zircaloy-4"
    locked_on: 2026-05-26
    rationale: "Zr-4 is PWR-standard. FER Table 1's Zr-2 was an illustrative template default, not a prescribed value."
  - id: enrichment_target
    decision: "Three-zone UO₂: 4.95 / 4.70 / 4.40 wt% U-235 (max 4.95)"
    locked_on: 2026-06-03   # rev_3 — supersedes the 2.6/3.0/3.4 baseline (2026-05-26)
    rationale: "rev_3 full-core OpenMC. Relaxed from 2.6/3.0/3.4 to chase high discharge burnup (42.8 GWd/MTU) + waste-intensity score. Max 4.95 <= 5.0 LEU ceiling. See safety/openmc_rev3_alignment.md."
  - id: burnable_absorber
    decision: "Hybrid: Gd₂O₃ 8 wt% (×32 rods, radially zoned) + Er₂O₃ 0.5 wt% (×16 rods)"
    locked_on: 2026-06-03   # rev_3
    rationale: "SBF hold-down. Gd-dominant zoned to flatten radial power (F_radial 1.23); Er slow flat hold-down + cold SDM for the 479 EFPD cycle. Supersedes earlier 'Er replacing Gd'."

