    impact: "Both are hard_constraint. If real, wFOM → DESIGN_REJECTED until the SBF loading is de-peaked; also gates MDNBR (DNBR feasibility) and LOCA PCT. If artifact, limits pass with margin."
    owner: OpenMC lead (Samira)
    needed_by: 2026-06-19
    status: "OPEN — (1) re-tally with a pin-aligned lattice/distribcell tally instead of RegularMesh (removes cell≠pitch aliasing + water-gap dilution); (2) add f_q + f_delta_h to notebook SAFETY_LIMITS and export as from_openmc.f_q / from_openmc.f_delta_h; (3) report engineering F_ΔH/F_q with uncertainty factors. **If still > LCO after re-tally, de-peak the SBF loading:** (a) IFBA (thin ZrB₂ coating) to flatten radial profile without large Gd lumps; (b) finer radial Gd zoning gradient; (c) pin-level enrichment grading — lower enrichment in the high-peak locations (guide-tube/water-hole-adjacent + peripheral pins); (d) loading-pattern optimization (trade low-leakage vs flatter). Target F_ΔH ≤ 1.55, F_q ≤ 2.30 with margin to the LCOs."
